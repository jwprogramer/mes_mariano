    <meta charset="UTF-8">

    <title>Mês Mariano 2026</title>
    <style>
        :root {
            --primary-blue: #1a5f7a;
            --secondary-blue: #0088cc;
            --light-blue: #e6f2ff;
            --accent: #ffd700;
            --white: #ffffff;
            --text-dark: #333333;
            --shadow: 0 4px 10px rgba(0, 0, 0, 0.15);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', sans-serif;
        }

        body {
            background-color: #f0f4f8;
            color: var(--text-dark);
            padding-bottom: 30px;
        }

        header {
            background: linear-gradient(135deg, var(--primary-blue), var(--secondary-blue));
            color: white;
            padding: 25px 15px;
            text-align: center;
            position: sticky;
            top: 0;
            z-index: 1000;
            box-shadow: var(--shadow);
        }

        .search-container {
            padding: 15px;
            background: var(--white);
            margin: 10px;
            border-radius: 50px;
            box-shadow: var(--shadow);
            display: flex;
            align-items: center;
        }

        #searchInput {
            width: 100%;
            border: none;
            outline: none;
            font-size: 1rem;
            padding-left: 10px;
        }

        .schedule-container {
            padding: 10px;
            max-width: 600px;
            margin: auto;
        }

        .day-card {
            background: var(--white);
            margin-bottom: 25px;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: var(--shadow);
            transition: transform 0.2s;
        }

        .day-card.special-day {
            background: linear-gradient(135deg, var(--primary-blue), var(--secondary-blue));
            margin-bottom: 25px;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: var(--shadow);
            transition: transform 0.2s;
            width: 100%;
            height: 100px;
        }

        .santa-img {
            width: 100%;
            height: 400px;
            object-fit: cover;
            object-position: top;
            background-color: #ddd;
            border-bottom: 4px solid var(--accent);
        }

        .day-content {
            padding: 15px;
        }

        .day-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 10px;
        }

        .date-box {
            background: var(--primary-blue);
            color: white;
            padding: 5px 10px;
            border-radius: 8px;
            font-weight: bold;
            font-size: 0.9rem;
        }

        .date-box_special {
            color: white;
            font-weight: bold;
            font-size: 0.9rem;
            margin-right: 10px;
        }

        .title-box {
            color: var(--primary-blue);
            font-weight: 800;
            font-size: 1.1rem;
            text-align: right;
            flex: 1;
            margin-left: 10px;
        }

        .title-box_special {
            color: white;
            font-weight: 800;
            font-size: 1.1rem;
            text-align: right;
            flex: 1;
            margin-left: 10px;
        }

        .names-list {
            border-top: 1px solid #eee;
            padding-top: 10px;
        }

        .name-item {
            padding: 4px 0;
            font-size: 0.95rem;
            color: #555;
            display: flex;
            align-items: center;
        }

        .name-item_special {
            padding: 4px 0;
            font-size: 0.95rem;
            color: #ffffff;
            display: flex;
            align-items: center;
        }


        .name-item::before {
            content: "•";
            color: var(--secondary-blue);
            font-weight: bold;
            margin-right: 8px;
        }

        .special-day {
            border: 2px solid var(--accent);
        }

        .no-results {
            text-align: center;
            padding: 40px;
            color: #888;
            display: none;
        }

        footer {
            text-align: center;
            padding: 20px;
            font-size: 0.8rem;
            color: #666;
        }
    </style>
</head>

        function render() {
            const container = document.getElementById('schedule');
            container.innerHTML = programacao.map(dia => `
            <div class="${dia.titulo === 'Abertura' || dia.titulo === 'Encerramento' ? 'day-card special-day' : 'day-card'}">
                ${dia.img
                    ? `<img src="${dia.img}" class="santa-img" alt="${dia.titulo}" loading="lazy">`
                    : `<div class="day-content">
                    <div class="day-header">
                        <div class="date-box_special">${dia.data}</div>
                        <div class="date-box_special">${dia.dia_semana}</div>
                        <div class="title-box_special">${dia.titulo}</div>
                    </div>
                    <div class="names-list">
                        ${dia.nomes.map(n => `<div class="name-item_special">${n}</div>`).join('')}
                    </div>
                </div>
                <div class="santa-img" style="background: linear-gradient(135deg, var(--primary-blue), var(--secondary-blue));"></div>`}
                <div class="day-content">
                    <div class="day-header">
                        <div class="date-box">${dia.data}</div>
                        <div class="date-box" style="background: var(--secondary-blue); margin-left: 0;">${dia.dia_semana}</div>
                        <div class="title-box">${dia.titulo}</div>
                    </div>
                    <div class="names-list">
                        ${dia.nomes.map(n => `<div class="name-item">${n}</div>`).join('')}
                    </div>
                </div>
            </div>
        `).join('');
        }

        function filterContent() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            const cards = document.getElementsByClassName('day-card');
            let found = false;

            for (let card of cards) {
                if (card.innerText.toLowerCase().includes(query)) {
                    card.style.display = "block";
                    found = true;
                } else {
                    card.style.display = "none";
                }
            }
            document.getElementById('noResults').style.display = found ? "none" : "block";
        }

        render();
    </script>
